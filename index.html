<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    const loadChatWidget = () => {
      if (window.__driewingChatLoaded) return;
      window.__driewingChatLoaded = true;
      window.Tawk_API = window.Tawk_API || {};
      window.Tawk_LoadStart = new Date();

      const widgetScript = document.createElement("script");
      widgetScript.async = true;
      widgetScript.src = "https://embed.tawk.to/69d7aa282767f61c308020ce/1jlp71bt2";
      widgetScript.charset = "UTF-8";
      widgetScript.setAttribute("crossorigin", "*");
      document.body.appendChild(widgetScript);
    };

    const scheduleChatLoad = () => {
      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(loadChatWidget, { timeout: 5000 });
      } else {
        window.setTimeout(loadChatWidget, 3500);
      }
    };

    window.addEventListener("load", scheduleChatLoad, { once: true });
    ["pointerdown", "scroll", "keydown"].forEach((eventName) => {
      window.addEventListener(eventName, loadChatWidget, {
        once: true,
        passive: true,
      });
    });
  </script>
